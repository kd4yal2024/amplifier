<!doctype html>
<html>
    <head>
        <link rel="stylesheet" href="/static/amplifier.css?v=20260314a" />
        <link rel="stylesheet" href="/static/skin.css?v=20260201" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
    </head>
    <body>
    <div id="amp_header" class="amp-header">
      <div class="amp-header-left">
        <div class="amp-pill"><span class="amp-ico">🌐</span><span id="header_addr">0.0.0.0:0000</span></div>
        <div class="amp-pill"><span class="amp-dot"></span><span id="header_conn">ONLINE</span></div>
      </div>
      <div class="amp-header-center">
        <div class="amp-pill"><span class="amp-ico">🕒</span><span id="header_clock"></span></div>
      </div>
      <div class="amp-header-right">
        <div class="amp-pill"><span class="amp-ico">📡</span><span id="header_callsign"></span></div>
        <div class="amp-pill" id="header_tci_pill"><span class="amp-ico">🛰️</span><span id="header_tci">TCI: DISCONNECTED</span></div>
        <div class="amp-pill"><span class="amp-ico">🎛️</span><span id="header_cat">CAT: DISCONNECTED</span></div>
        <button class="meter-toggle" id="meter_toggle" type="button" aria-label="Toggle meter view">📟</button>
        <button class="theme-toggle" id="theme_toggle" type="button" aria-label="Toggle theme">🌙</button>
      </div>
    </div>

        <table>
            <tr>
                <th>Tune</th>
                <th>Inductor</th>
                <th>Load</th>
                <th>Gauges</th>
                <th>Gauges</th>
            </tr>
            <tr>
                <td>
                    <!-- Container for the meter and its components TUNE-->
                    <div class="meter-container">
                        <!-- Container for the meter reading lines -->
                        <div class="line-container">
                            <!-- Lines will be dynamically added here by JavaScript -->
                        </div>
                        <!-- The circular meter itself -->
                        <div class="meter" id="meter_tune"></div>
                    </div>

                    <!-- Display for the current meter reading -->
                    <div class="meter-reading" id="tune">0</div>
                </td>
                <td>
                    <!-- Container for the meter and its components INDUCTOR-->
                    <div class="meter-container">
                        <!-- Container for the meter reading lines -->
                        <div class="line-container">
                            <!-- Lines will be dynamically added here by JavaScript -->
                        </div>
                        <!-- The circular meter itself -->
                        <div class="meter" id="meter_ind"></div>
                    </div>

                    <!-- Display for the current meter reading -->
                    <div class="meter-reading" id="ind">0</div>
                </td>
                <td>
                    <!-- Container for the meter and its components LOAD-->
                    <div class="meter-container">
                        <!-- Container for the meter reading lines -->
                        <div class="line-container">
                            <!-- Lines will be dynamically added here by JavaScript -->
                        </div>
                        <!-- The circular meter itself -->
                        <div class="meter" id="meter_load"></div>
                    </div>

                    <!-- Display for the current meter reading -->
                    <div class="meter-reading" id="load">0</div>
                </td>
                <td>
                    <div class="meter-digital">
                        <div class="lcd-label">Plate Volts</div>
                        <div class="lcd gauge-lcd" id="plate_volts">0V</div>
                        <div class="mini-bar">
                            <div class="mini-bar-fill" id="plate_volts_bar"></div>
                        </div>
                    </div>
                    <div class="meter-analog">
                        <div class="analog-label">Plate Volts</div>
                        <div class="analog-gauge" id="plate_volts_gauge">
                            <svg class="analog-scale" viewBox="0 0 200 140" aria-hidden="true">
                                <path class="analog-arc" d="M20 120 A80 80 0 0 1 180 120" pathLength="100" />
                                <path class="analog-ticks" d="M20 120 A80 80 0 0 1 180 120" pathLength="100" />
                            </svg>
                            <div class="analog-needle" id="plate_volts_needle"></div>
                            <div class="analog-center"></div>
                        </div>
                        <div class="analog-readout" id="plate_volts_readout">0V</div>
                    </div>
                </td>
                <td>
                    <div class="meter-digital">
                        <div class="lcd-label">Plate Amps</div>
                        <div class="lcd gauge-lcd" id="plate_amps">0A</div>
                        <div class="mini-bar">
                            <div class="mini-bar-fill" id="plate_amps_bar"></div>
                        </div>
                    </div>
                    <div class="meter-analog">
                        <div class="analog-label">Plate Amps</div>
                        <div class="analog-gauge" id="plate_amps_gauge">
                            <svg class="analog-scale" viewBox="0 0 200 140" aria-hidden="true">
                                <path class="analog-arc" d="M20 120 A80 80 0 0 1 180 120" pathLength="100" />
                                <path class="analog-ticks" d="M20 120 A80 80 0 0 1 180 120" pathLength="100" />
                            </svg>
                            <div class="analog-needle" id="plate_amps_needle"></div>
                            <div class="analog-center"></div>
                        </div>
                        <div class="analog-readout" id="plate_amps_readout">0A</div>
                    </div>
                </td>
            </tr>
            <tr id="bar_meters"></tr>
            <tr>
                <td>
                    <button
                        class="button"
                        id="tune_button"
                        type="submit"
                        name="tune"
                        value="Tune"
                    >
                        Tune
                    </button>
                </td>
                <td>
                    <button
                        class="button"
                        id="ind_button"
                        type="submit"
                        name="ind"
                        value="Inductor"
                    >
                        Inductor
                    </button>
                </td>
                <td>
                    <button
                        class="button"
                        id="load_button"
                        type="submit"
                        name="load"
                        value="Load"
                    >
                        Load
                    </button>
                </td>
                <td>
                    <div class="meter-digital">
                        <div class="lcd-label">Screen Amps</div>
                        <div class="lcd gauge-lcd" id="screen_amps">0mA</div>
                        <div class="mini-bar">
                            <div class="mini-bar-fill" id="screen_amps_bar"></div>
                        </div>
                    </div>
                    <div class="meter-analog">
                        <div class="analog-label">Screen Amps</div>
                        <div class="analog-gauge" id="screen_amps_gauge">
                            <svg class="analog-scale" viewBox="0 0 200 140" aria-hidden="true">
                                <path class="analog-arc" d="M20 120 A80 80 0 0 1 180 120" pathLength="100" />
                                <path class="analog-ticks" d="M20 120 A80 80 0 0 1 180 120" pathLength="100" />
                            </svg>
                            <div class="analog-needle" id="screen_amps_needle"></div>
                            <div class="analog-center"></div>
                        </div>
                        <div class="analog-readout" id="screen_amps_readout">0mA</div>
                    </div>
                </td>
                <td>
                    <div class="meter-digital">
                        <div class="lcd-label">Grid Amps</div>
                        <div class="lcd gauge-lcd" id="grid_amps">0mA</div>
                        <div class="mini-bar">
                            <div class="mini-bar-fill" id="grid_amps_bar"></div>
                        </div>
                    </div>
                    <div class="meter-analog">
                        <div class="analog-label">Grid Amps</div>
                        <div class="analog-gauge" id="grid_amps_gauge">
                            <svg class="analog-scale" viewBox="0 0 200 140" aria-hidden="true">
                                <path class="analog-arc" d="M20 120 A80 80 0 0 1 180 120" pathLength="100" />
                                <path class="analog-ticks" d="M20 120 A80 80 0 0 1 180 120" pathLength="100" />
                            </svg>
                            <div class="analog-needle" id="grid_amps_needle"></div>
                            <div class="analog-center"></div>
                        </div>
                        <div class="analog-readout" id="grid_amps_readout">0mA</div>
                    </div>
                </td>
            </tr>
            <tr id="band_selectors" style="height: 3.2rem"></tr>
            <!-- horizontal bars removed for Tune/Ind/Load -->
        </table>
        <table id="power_btns">
            <tr>
                <th>Blower</th>
                <th>Filament</th>
                <th>HV</th>
                <th>Stb/Oper</th>
            </tr>
        </table>

        <p id="status_bar"></p>

        <div class="footer-actions">
            <button
                id="store_btn"
                class="button"
                name="store"
                type="submit"
                value="Store"
            >
                Store To Band
            </button>
            <button id="save_btn" class="button" name="save" value="Save">
                Save Profile
            </button>
            <button
                class="button"
                id="config_btn"
                name="config"
                type="submit"
                value="Config Page"
            >
                Config
            </button>
        </div>
    </body>
    <script src="/static/amplifier3.js?v=20260201r" type="text/javascript"></script>
</html>
